specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans

provider: WeatherAPI.com
providerId: weatherapi
created: '2026-05-28'
modified: '2026-05-28'
reconciled: true

tags:
  - Weather
  - Geolocation
  - Forecast
  - Marine
  - Astronomy
  - Subscription

description: >-
  WeatherAPI.com sells five subscription tiers (Free, Starter, Pro+, Business, Enterprise) priced on
  monthly call volume and breadth of API surface. All tiers receive the same core endpoints
  (current, search, astronomy, IP lookup, weather maps, SSL, commercial and non-commercial use);
  paid tiers unlock longer forecasts, deeper history, marine with tides, bulk requests, and richer
  data products (air quality, pollen, solar, sports, evapotranspiration). Enterprise adds an SLA,
  15-minute interval data, and 100% uptime guarantee. Pricing is documented on the public pricing
  page; annual pre-pay yields a roughly 10% discount versus monthly billing.

sources:
  - https://www.weatherapi.com/pricing.aspx
  - https://www.weatherapi.com/docs/

plans:

