    toolCount: 4
    personas:
    - Weather Data Developer
    - Mobile App Developer
    - Logistics/Travel Planner
    domains:
    - WeatherAPI
    - Weather
    - Geo
  - name: WeatherAPI.com — History
    file: capabilities/weatherapi-history.yaml
    description: 'History — History. 1 operation. Lead operation: WeatherAPI Historical Weather. Self-contained Naftiko capability covering one WeatherAPI business surface.'
    apis:
