    toolCount: 1
    personas:
    - Weather Data Developer
    - Mobile App Developer
    - Logistics/Travel Planner
    domains:
    - WeatherAPI
    - Weather
    - History
  - name: WeatherAPI.com — Marine
    file: capabilities/weatherapi-marine.yaml
    description: 'Marine — Marine. 1 operation. Lead operation: WeatherAPI Marine Weather. Self-contained Naftiko capability covering one WeatherAPI business surface.'
    apis:
    - WeatherAPI
    toolCount: 1
    personas:
    - Weather Data Developer
    - Mobile App Developer
    - Logistics/Travel Planner
    domains:
    - WeatherAPI
    - Weather
    - Marine
  - name: WeatherAPI.com — Sports
    file: capabilities/weatherapi-sports.yaml
    description: 'Sports — Sports. 1 operation. Lead operation: WeatherAPI Sports Events. Self-contained Naftiko capability covering one WeatherAPI business surface.'
    apis:
    - WeatherAPI
    toolCount: 1
    personas:
    - Weather Data Developer
    - Mobile App Developer
    - Logistics/Travel Planner
    domains:
    - WeatherAPI
    - Weather
    - Sports
  - name: WeatherAPI.com — Weather
    file: capabilities/weatherapi-weather.yaml
    description: 'Weather — Weather. 3 operations. Lead operation: WeatherAPI Current / Real-time Weather. Self-contained Naftiko capability covering one WeatherAPI business surface.'
    apis:
    - WeatherAPI
    toolCount: 3
    personas:
    - Weather Data Developer
    - Mobile App Developer
    - Logistics/Travel Planner
    domains:
    - WeatherAPI
    - Weather
    - Weather
  personas:
  - id: weather-data-developer
    name: Weather Data Developer
    description: Integrates real-time, forecast, and historical weather data into web/mobile apps and dashboards.
    workflows:
    - WeatherAPI.com — Alerts
    - WeatherAPI.com — Future
    - WeatherAPI.com — Geo
    - WeatherAPI.com — History
    - WeatherAPI.com — Marine
    - WeatherAPI.com — Sports
    - WeatherAPI.com — Weather
  - id: mobile-app-developer
    name: Mobile App Developer
    description: Builds consumer mobile apps that surface forecast, astronomy, marine, or alerts data based on the user location.
    workflows:
    - WeatherAPI.com — Alerts
    - WeatherAPI.com — Future
    - WeatherAPI.com — Geo
    - WeatherAPI.com — History
    - WeatherAPI.com — Marine
    - WeatherAPI.com — Sports
    - WeatherAPI.com — Weather
  - id: logistics-planner
    name: Logistics & Travel Planner
    description: Plans routes, deliveries, and events around forecast, alerts, marine conditions, and sports schedules.
    workflows:
    - WeatherAPI.com — Alerts
    - WeatherAPI.com — Future
    - WeatherAPI.com — Marine
    - WeatherAPI.com — Sports
  - id: data-scientist
    name: Climate Data Scientist
    description: Mines historical weather data from 2010 onwards for trend analysis and ML training.
    workflows:
    - WeatherAPI.com — History
  domains:
  - name: Real-time Weather
    description: Current conditions for any location worldwide.
  - name: Forecast
    description: 14-day daily and hourly weather forecasts.
  - name: Historical Weather
    description: Past weather data from January 1, 2010.
  - name: Future Weather
    description: Long-range forecasts 14 to 300 days ahead.
  - name: Marine
    description: Marine weather with waves, swells, and tide tables.
  - name: Alerts
    description: Government-issued weather warnings.
  - name: Geo
    description: Location search, IP geolocation, time zones, and astronomy.
  - name: Sports
    description: Upcoming football, cricket, and golf events.
  namespaces:
  - consumed: weatherapi-alerts
    rest: weatherapi-alerts-rest
    mcp: weatherapi-alerts-mcp
    restPort: 8080
    mcpPort: 9090
  - consumed: weatherapi-future
    rest: weatherapi-future-rest
    mcp: weatherapi-future-mcp
    restPort: 8080
    mcpPort: 9090
  - consumed: weatherapi-geo
