    mcp: weatherapi-marine-mcp
    restPort: 8080
    mcpPort: 9090
  - consumed: weatherapi-sports
    rest: weatherapi-sports-rest
    mcp: weatherapi-sports-mcp
    restPort: 8080
    mcpPort: 9090
  - consumed: weatherapi-weather
    rest: weatherapi-weather-rest
    mcp: weatherapi-weather-mcp
    restPort: 8080
    mcpPort: 9090
  binds:
  - name: WEATHERAPI_KEY
    description: WeatherAPI.com API key (free tier available, passed as ?key=...).
    usedBy:
    - WeatherAPI.com — Alerts
    - WeatherAPI.com — Future
    - WeatherAPI.com — Geo
    - WeatherAPI.com — History
    - WeatherAPI.com — Marine
    - WeatherAPI.com — Sports
    - WeatherAPI.com — Weather
