naftiko: 1.0.0-alpha2
info:
  label: WeatherAPI.com — Sports
  description: |-
    Sports — Sports. 1 operation. Lead operation: WeatherAPI Sports Events. Self-contained Naftiko capability covering one WeatherAPI business surface.
  tags:
  - WeatherAPI
  - Weather
  - Sports
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    WEATHERAPI_KEY: WEATHERAPI_KEY
capability:
  consumes:
  - type: http
    namespace: weatherapi-sports
    baseUri: https://api.weatherapi.com/v1
    description: WeatherAPI.com — Sports business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: key
      value: '{{env.WEATHERAPI_KEY}}'
      placement: query
    resources:
    - name: sports-json
      path: /sports.json
      operations:
      - name: getSports
        method: GET
        description: WeatherAPI Sports Events
        inputParameters:
        - name: key
          in: query
          type: string
          required: true
          description: Your WeatherAPI.com API key.
        - name: q
          in: query
          type: string
          required: true
          description: 'Location query. Accepts: city name, lat/lon, US zip, UK postcode, Canada postal code, METAR code (metar:EGLL), IATA (iata:DXB), auto:ip, IPv4/IPv6, or location ID (id:2801268).'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: weatherapi-sports-rest
    port: 8080
    description: REST adapter for WeatherAPI.com — Sports. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/sports
      name: sports
      description: REST surface for /sports.
      operations:
      - method: GET
        name: getSports
        description: WeatherAPI Sports Events
        call: weatherapi-sports.getSports
        with:
          key: rest.key
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: weatherapi-sports-mcp
    port: 9090
    transport: http
    description: MCP adapter for WeatherAPI.com — Sports. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-sports
      description: WeatherAPI Sports Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: weatherapi-sports.getSports
      with:
        key: tools.key
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
